name: app
description: "A new Flutter project."


publish_to: 'none'




version: 3.0.0+1

environment:
  sdk: '>=3.3.1 <4.0.0'







dependencies:
  flutter:
    sdk: flutter




  cupertino_icons: ^1.0.6
  dartz: ^0.10.1
  dio: ^5.4.1
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.6
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.0.0
  flutter_screenutil: ^5.9.0
  pretty_dio_logger: ^1.3.1
  firebase_crashlytics: ^4.3.6
  internet_connection_checker: ^1.0.0+1
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  socket_io_client: ^2.0.3+1
  get: ^4.7.3
  get_cli: ^1.8.1
  get_storage: ^2.1.1
  flutter_phoenix: ^1.1.1
  flutter_svg: ^2.0.10+1
  flutter_localization: ^0.2.0
  pin_code_fields: ^8.0.1
  dropdown_button2: ^2.3.9
  url_launcher: ^6.2.6
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  sprintf: ^7.0.0
  file_picker: ^10.3.3
  intl: ^0.18.0
  path_provider: ^2.1.4
  #open_file: ^3.5.11
  signalr_netcore: ^1.4.4

dependency_overrides:
  intl: 0.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  change_app_package_name: ^1.3.0



flutter:


  uses-material-design: true



  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Cairo-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600

    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Poppins-Black.ttf
          weight: 900
        # Optional italics
        - asset: assets/fonts/Poppins-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assets/fonts/Poppins-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/Poppins-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/Poppins-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Poppins-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Poppins-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Poppins-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/Poppins-BlackItalic.ttf
          weight: 900
          style: italic




